name: Eval (Gwageo)

on:
  pull_request:
    branches: [main]
    paths:
      - "packs/**"
      - "sillok/naru/**"
      - "sillok/bongsu/**"
      - "sillok/eval/**"
      - ".github/workflows/eval.yml"
  schedule:
    # Daily nightly soak
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  rag-probes:
    name: RAG probes (10 / 6 families) + KPI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install -e .
      - name: Run probes (exit 1 on any failure)
        run: python -m sillok.eval run
      - name: Emit JSON summary as artifact
        if: always()
        run: python -m sillok.eval run --json > eval-summary.json
      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-summary-${{ github.run_id }}
          path: eval-summary.json
          retention-days: 30
