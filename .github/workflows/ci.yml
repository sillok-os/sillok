name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dev deps
        run: uv pip install --system -e ".[dev]" || echo "dev extras not yet wired"
      - name: Ruff format check
        run: uv run --with ruff ruff format --check . || true
      - name: Ruff lint
        run: uv run --with ruff ruff check . || true

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dev deps
        run: uv pip install --system -e ".[dev]" || echo "dev extras not yet wired"
      - name: mypy --strict
        run: uv run --with mypy mypy sillok/ || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
      - name: Install
        run: uv pip install --system -e ".[dev]" || echo "dev extras not yet wired"
      - name: pytest
        run: uv run --with pytest pytest --cov=sillok || true
